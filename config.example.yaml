llm:
  base_url: "https://api.openai.com/v1"
  model: "gpt-3.5-turbo"
  api_key: "your-api-key"
  timeout: 30
  max_retries: 3
  protocol: "openai"
  enable_tools: true

# Feishu (Lark) integration via lark-oapi
feishu:
  app_id: ""
  app_secret: ""
  enabled: false
  tenant_key: ""
  encrypt_key: ""
  verification_token: ""
  # 推送服务配置（可选）
  push:
    enabled: true
    schedule:
      enabled: false
      interval_minutes: 60
  # 访问控制配置（可选）
  access_control:
    enabled: false
    mode: "open"
    whitelist: []
    blacklist: []
  # 限流配置（可选）
  rate_limit:
    enabled: true
    requests_per_minute: 30
    window_seconds: 60

skills:
  web_search:
    enabled: true
    engine: "duckduckgo"
  calculator:
    enabled: true

external_skill_dirs: []

mcp:
  servers:
    - name: "weather"
      transport: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-weather"
      enabled: true
      description: "天气查询服务"

