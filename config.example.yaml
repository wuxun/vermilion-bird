# 大模型对话工具配置示例

# LLM 配置
llm:
  # 模型 API 基础 URL
  base_url: "https://api.openai.com/v1"
  
  # 模型名称
  model: "gpt-3.5-turbo"
  
  # API 密钥
  api_key: "your-api-key"
  
  # 请求超时时间（秒）
  timeout: 30
  
  # 最大重试次数
  max_retries: 3
  
  # API 协议类型: openai, anthropic, gemini
  protocol: "openai"

