[tool.poetry]
name = "ember-core"
version = "0.1.0"
description = "Zero-LLM infrastructure: tools, storage, MCP, state graphs, pipelines"
authors = ["Vermilion Bird Contributors"]
readme = "README.md"
packages = [{include = "ember_core", from = "src"}]

[tool.poetry.dependencies]
python = "^3.9"
pydantic = "^2.5.0"
mcp = "^1.0.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100
target-version = ["py39"]
