[tool.poetry]
name = "ember-agent"
version = "0.1.0"
description = "Multi-agent collaboration: roles, workflows, consensus, peer review"
authors = ["Vermilion Bird Contributors"]
readme = "README.md"
packages = [{include = "ember_agent", from = "src"}]

[tool.poetry.dependencies]
python = "^3.9"
pydantic = "^2.5.0"
ember-core = { path = "../ember-core", develop = true }

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100
target-version = ["py39"]
