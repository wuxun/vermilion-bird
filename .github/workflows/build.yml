name: Build & Package

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          pip install poetry

      - name: Install project dependencies
        run: |
          poetry install --no-interaction --no-ansi

      - name: Install PyInstaller
        run: |
          poetry run pip install pyinstaller

      - name: Convert icon (PNG → ICNS)
        run: |
          if [ -f vermilion_bird_small.png ] && [ ! -f icon.icns ]; then
            mkdir -p icon.iconset
            for size in 16 32 128 256 512; do
              sips -z $size $size vermilion_bird_small.png \
                --out "icon.iconset/icon_${size}x${size}.png" >/dev/null
              sips -z $((size*2)) $((size*2)) vermilion_bird_small.png \
                --out "icon.iconset/icon_${size}x${size}@2x.png" >/dev/null
            done
            sips -z 1024 1024 vermilion_bird_small.png \
              --out icon.iconset/icon_512x512@2x.png >/dev/null
            iconutil -c icns icon.iconset -o icon.icns
            rm -rf icon.iconset
          fi

      - name: Build with PyInstaller
        run: |
          poetry run pyinstaller vermilion-bird.spec

      - name: Prepare artifacts
        run: |
          rm -rf dist/vermilion-bird-gui  # 清理 onedir 目录
          # 打包成 zip 便于下载
          cd dist
          zip -r ../vermilion-bird-macos.zip \
            vermilion-bird \
            "Vermilion Bird.app"
          cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vermilion-bird-macos-${{ github.ref_name }}
          path: |
            dist/vermilion-bird
            dist/Vermilion Bird.app
          compression-level: 0

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vermilion-bird-macos.zip
