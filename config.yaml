enable_tools: true
llm:
  api_key: null
  base_url: https://api.openai.com/v1
  max_retries: 3
  model: gpt-3.5-turbo
  protocol: openai
  timeout: 30
mcp:
  servers: []
memory:
  enabled: true
  exclude_patterns:
  - 密码
  - password
  - token
  - api_key
  long_term:
    auto_evolve: true
    evolve_interval_days: 7
  mid_term:
    max_days: 30
  short_term:
    max_items: 10
  storage_dir: ~/.vermilion-bird/memory
scheduler:
  default_timezone: Asia/Shanghai
  enabled: true
  max_workers: 4
  proactive_enabled: true
  proactive_rss_feeds:
    # 科技/开发者
    - https://hnrss.org/frontpage?count=10
    - https://lobste.rs/rss
    - https://feeds.arstechnica.com/arstechnica/index
    # 中文科技
    - https://feeds.feedburner.com/ruanyifeng
    - https://www.solidot.org/index.rss
    - https://sspai.com/feed
    # 科学/学术
    - http://export.arxiv.org/api/query?search_query=cat:cs.AI&sortBy=submittedDate&max_results=5
    - https://www.nature.com/nature.rss
    # 英文综合
    - https://www.theverge.com/rss/index.xml
skills:
  shell_exec:
    allowed_workdir: ./
    default_timeout: 5
    enabled: true
    max_output_length: 10000
    whitelist:
    - ls
    - pwd
    - cat
    - grep
    - head
    - tail
    - wc
    - du
    - df
    - git
    - find
    - echo
    - date
    - whoami
    - uname
    - env
    - printenv
  web_search:
    enabled: false
    # serpapi_api_key: "your_serpapi_key"  # 配置后优先使用 SerpAPI (Google 搜索)
