llm:
  base_url: "https://api.openai.com/v1"
  model: "gpt-3.5-turbo"
  api_key: null
  timeout: 30
  max_retries: 3
  protocol: "openai"

enable_tools: true

mcp:
  servers:
    # Tavily Search - 专为 AI 设计的搜索引擎（推荐）
    # 需要先获取 API Key: https://tavily.com/
    # - name: "tavily-search"
    #   transport: "stdio"
    #   command: "npx"
    #   args: ["-y", "tavily-mcp"]
    #   env:
    #     TAVILY_API_KEY: "your-tavily-api-key"
    #   enabled: false
    #   description: "Tavily 搜索引擎 - 专为 AI 设计"
    
    # Brave Search - 隐私友好的搜索引擎
    # 需要先获取 API Key: https://brave.com/search/api/
    # - name: "brave-search"
    #   transport: "stdio"
    #   command: "npx"
    #   args: ["-y", "@modelcontextprotocol/server-brave-search"]
    #   env:
    #     BRAVE_API_KEY: "your-brave-api-key"
    #   enabled: false
    #   description: "Brave 搜索引擎"

# Scheduler 配置：不包含 db_path，复用现有数据库
scheduler:
  enabled: true
  max_workers: 4
  default_timezone: "Asia/Shanghai"

# Shell 执行技能配置
skills:
  shell_exec:
    enabled: true
    whitelist:
      - "ls"
      - "pwd"
      - "cat"
      - "grep"
      - "head"
      - "tail"
      - "wc"
      - "du"
      - "df"
      - "git"
      - "find"
      - "echo"
      - "date"
      - "whoami"
      - "uname"
      - "env"
      - "printenv"
    default_timeout: 5
    max_output_length: 10000
    allowed_workdir: "./"

memory:
  enabled: true
  storage_dir: "~/.vermilion-bird/memory"
  short_term:
    max_items: 10
  mid_term:
    max_days: 30
  long_term:
    auto_evolve: true
    evolve_interval_days: 7
  exclude_patterns:
    - "密码"
    - "password"
    - "token"
    - "api_key"
